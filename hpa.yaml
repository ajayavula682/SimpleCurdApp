apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: simplecurdapp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: simplecurdapp
  minReplicas: 2 # Minimum number of replicas
  maxReplicas: 10 # Maximum number of replicas
  metrics: # Define the metrics to monitor for scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50 # Target average CPU utilization percentage